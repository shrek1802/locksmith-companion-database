name: Audit Ford Security Access

on:
  workflow_dispatch:
  push:
    paths:
      - 'database/vehicles/ford/**/models.json'
      - 'scripts/audit_ford_security_access.py'
      - '.github/workflows/audit-ford-security-access.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit Ford security-access routes
        run: python scripts/audit_ford_security_access.py

      - name: Commit audit report
        if: always()
        run: |
          if git diff --quiet -- reports/ford_security_access_audit.json; then
            echo 'Security-access audit report is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/ford_security_access_audit.json
          git commit -m 'Update Ford security-access audit report'
          git push

# Trigger audit: 2026-07-17
