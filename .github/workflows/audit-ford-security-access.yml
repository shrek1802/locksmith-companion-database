name: Audit Ford Security Access

on:
  workflow_dispatch:
  push:
    paths:
      - 'database/vehicles/ford/**/models.json'
      - 'scripts/audit_ford_security_access.py'
      - '.github/workflows/audit-ford-security-access.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit Ford security-access routes
        id: audit
        continue-on-error: true
        run: python scripts/audit_ford_security_access.py

      - name: Commit audit report
        run: |
          if [ -z "$(git status --porcelain -- reports/ford_security_access_audit.json)" ]; then
            echo 'Security-access audit report is already current.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add reports/ford_security_access_audit.json
            git commit -m 'Update Ford security-access audit report'
            git push
          fi

      - name: Fail when invalid security-access values remain
        if: steps.audit.outcome == 'failure'
        run: |
          echo 'Ford security-access audit found invalid values. The report has been saved.'
          exit 1

# Trigger audit after canonicalisation: 2026-07-17
