name: Build Ford Operation Research Queue

on:
  workflow_dispatch:
  push:
    paths:
      - 'reports/ford_modern_safety_quarantine.json'
      - 'scripts/build_ford_operation_research_queue.py'
      - '.github/workflows/build-ford-operation-research-queue.yml'

permissions:
  contents: write

jobs:
  build-queue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build operation-specific Ford research queue
        run: python scripts/build_ford_operation_research_queue.py

      - name: Commit generated queue
        run: |
          if git diff --quiet -- reports/ford_operation_research_queue.json; then
            echo 'Research queue is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/ford_operation_research_queue.json
          git commit -m 'Generate Ford operation research queue'
          git push
