name: Install Database Pack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Database Repo
        uses: actions/checkout@v4

      - name: Check database_pack.zip exists
        run: |
          if [ ! -f database_pack.zip ]; then
            echo "ERROR: database_pack.zip not found in repo root"
            exit 1
          fi

      - name: Extract database pack
        run: |
          rm -rf _pack
          mkdir _pack
          unzip -o database_pack.zip -d _pack

          echo "Pack contents:"
          find _pack -maxdepth 4 -type f

          cp -R _pack/. .

          rm -rf _pack
          rm -f database_pack.zip

      - name: Commit database update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Install database pack"
            git push
          fi
