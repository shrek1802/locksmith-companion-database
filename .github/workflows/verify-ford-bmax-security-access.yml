name: Verify Ford B-Max Security Access

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/verify_ford_bmax_security_access.py'
      - '.github/workflows/verify-ford-bmax-security-access.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply verified B-Max security-access routes
        run: python scripts/verify_ford_bmax_security_access.py

      - name: Commit B-Max updates
        run: |
          if [ -z "$(git status --porcelain -- database/vehicles/ford/b_max/models.json)" ]; then
            echo 'B-Max security-access data is already current.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add database/vehicles/ford/b_max/models.json
            git commit -m 'ford: verify B-Max security-access routes'
            git push
          fi
