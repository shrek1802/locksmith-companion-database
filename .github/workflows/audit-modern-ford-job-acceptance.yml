name: Audit modern Ford job acceptance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'database/vehicles/ford/**'
      - 'tools/audit_modern_ford_job_acceptance.py'
      - '.github/workflows/audit-modern-ford-job-acceptance.yml'

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run modern Ford safety audit
        id: audit
        continue-on-error: true
        run: python tools/audit_modern_ford_job_acceptance.py

      - name: Commit audit report
        run: |
          if git diff --quiet reports/modern_ford_job_acceptance_audit.json; then
            echo 'Audit report unchanged.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add reports/modern_ford_job_acceptance_audit.json
            git commit -m 'audit: refresh modern Ford job acceptance report'
            git push
          fi

      - name: Block unsafe data
        if: steps.audit.outcome == 'failure'
        run: |
          echo 'Modern Ford records failed the operation-specific tool safety audit.'
          exit 1
