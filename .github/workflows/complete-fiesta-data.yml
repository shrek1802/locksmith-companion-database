name: Complete Fiesta Data

on:
  push:
    branches: [main]
    paths:
      - 'tools/complete_fiesta_data.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  complete-fiesta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Complete Fiesta records
        run: python tools/complete_fiesta_data.py
      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('database/vehicles/ford/fiesta').glob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          json.loads(Path('database/vehicles/ford/manifest.json').read_text(encoding='utf-8'))
          json.loads(Path('manifest.json').read_text(encoding='utf-8'))
          print('Fiesta JSON validation passed')
          PY
      - name: Commit Fiesta completion
        run: |
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add database/vehicles/ford/fiesta database/vehicles/ford/manifest.json manifest.json
          git commit -m 'ford fiesta: remove duplicates and complete job fields'
          git push
