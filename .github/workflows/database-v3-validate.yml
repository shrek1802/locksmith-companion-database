name: Validate Database V3

on:
  push:
    branches:
      - database-v3-components
    paths:
      - "database_v3/**"
      - ".github/workflows/database-v3-validate.yml"
  pull_request:
    paths:
      - "database_v3/**"
      - ".github/workflows/database-v3-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate component relationships and evidence
        run: python database_v3/scripts/validate_v3.py

      - name: Validate standalone workshop events
        run: python database_v3/scripts/validate_workshop_events.py

      - name: Compile pilot vehicles and inject workshop evidence
        run: python database_v3/scripts/compile_v3.py

      - name: Build knowledge graph index
        run: python database_v3/scripts/build_knowledge_graph.py

      - name: Confirm generated outputs exist
        run: |
          test -s database_v3/compiled/vag_mqb_pilot.json
          test -s database_v3/compiled/knowledge_graph_index.json

      - name: Upload compiled Database V3 outputs
        uses: actions/upload-artifact@v4
        with:
          name: locksmith-knowledge-engine-v3
          path: |
            database_v3/compiled/vag_mqb_pilot.json
            database_v3/compiled/knowledge_graph_index.json
