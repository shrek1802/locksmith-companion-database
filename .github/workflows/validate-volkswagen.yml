name: Validate Volkswagen Database

on:
  pull_request:
    paths:
      - "database/vehicles/volkswagen/**"
      - "database/manifest.json"
      - "manifest.json"
      - "tools/validate_volkswagen.py"
      - ".github/workflows/validate-volkswagen.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-volkswagen:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Volkswagen data
        id: validate
        shell: bash
        run: |
          set +e
          python tools/validate_volkswagen.py 2>&1 | tee volkswagen-validation-report.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Volkswagen validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: volkswagen-validation-report
          path: volkswagen-validation-report.txt
          if-no-files-found: error
          retention-days: 14

      - name: Fail when Volkswagen validation reports errors
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1
