name: Enrich Ford equivalent key hardware

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/enrich_ford_equivalent_key_hardware.py'
      - '.github/workflows/enrich-ford-equivalent-key-hardware.yml'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Share equivalent Ford key hardware
        run: python tools/enrich_ford_equivalent_key_hardware.py

      - name: Rebuild Ford app records and report
        run: python tools/run_ford_completion.py

      - name: Validate Ford JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('database/vehicles/ford').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          json.loads(Path('reports/ford_full_rebuild_report.json').read_text(encoding='utf-8'))
          json.loads(Path('reports/ford_targeted_hardware_queue.json').read_text(encoding='utf-8'))
          print('Ford equivalent hardware validation passed')
          PY

      - name: Commit enriched Ford data
        run: |
          if git diff --quiet; then
            echo 'No equivalent Ford hardware changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add database/vehicles/ford manifest.json reports/ford_full_rebuild_report.json reports/ford_targeted_hardware_queue.json
          git commit -m 'ford: enrich equivalent key hardware and refresh queue'
          git push
