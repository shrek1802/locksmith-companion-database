name: Unzip and Cleanup Dynamic
on:
  push:
    paths:
      - '**/*.zip' # Triggers when ANY zip file is uploaded anywhere

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to delete zip and write JSONs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dynamic Extract and Delete
        run: |
          # 1. Automatically find the first zip file in the repo
          ZIP_FILE=$(find . -maxdepth 2 -name "*.zip" -print -quit)
          
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip archive: $ZIP_FILE"
            
            # 2. Extract contents directly into the same folder
            TARGET_DIR=$(dirname "$ZIP_FILE")
            unzip -o "$ZIP_FILE" -d "$TARGET_DIR"
            
            echo "Deleting original archive..."
            rm "$ZIP_FILE"
            
            # 3. Configure Git to push back
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            # 4. Commit and push JSON changes
            git add .
            git commit -m "Automation: Extracted zip and cleaned archive"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No zip archive detected in this commit."
          fi
          
